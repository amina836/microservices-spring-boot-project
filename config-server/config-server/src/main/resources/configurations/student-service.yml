server:
  port: 8091

spring:
  application:
    name: student-service

  datasource:
    url: jdbc:mysql://localhost:3306/students_db
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/